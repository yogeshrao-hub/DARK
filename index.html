<!DOCTYPE html>
<html>
<head>
<title>Stretton Location | [Your Brand]</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
/* Navigation Bar */
.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 2rem;
  background-color: #333;
  color: white;
}
.navbar a { color: white; text-decoration: none; margin-right: 1rem; }

/* Location Content */
.location-header {
  text-align: center;
  padding: 2rem;
  background-color: #f8f8f8;
}
.location-image { max-width: 100%; height: auto; }
.location-info { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }

/* Footer */
.footer {
  text-align: center;
  padding: 1rem;
  background-color: #333;
  color: white;
}
</style>
</head>
<body>
<!-- Navigation Bar -->
<div class="navbar">
  <a href="/">Home</a>
  <a href="/locations">Locations</a>
  <a href="/menu">Menu</a>
  <a href="/about">About</a>
  <a href="/contact">Contact</a>
</div>

<!-- Location Header -->
<div class="location-header">
  <h1>Stretton Location</h1>
  <p>Experience our signature dishes and drinks in the heart of Stretton.</p>
</div>

<!-- Location Content -->
<div class="location-info">
  <div>
    <h2>Location Details</h2>
    <p>Address: [Your Address]</p>
    <p>Hours: [Opening Hours]</p>
    <p>Phone: [Contact Number]</p>
  </div>
  <div>
    <img src="/images/location-stretton.jpg" alt="Stretton Location" class="location-image">
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <p>&copy; [Current Year] [Your Brand]. All rights reserved.</p>
</div>
</body>
</html>
