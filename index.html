<!DOCTYPE html>
<html>
<head>
<style>
.top-bar {
  background-color: #333;
  padding: 10px;
  position: fixed;
  width: 100%;
  z-index: 1000;
}
.top-bar ul {
  list-style-type: none;
  margin: 0;
  padding: 0;
  overflow: hidden;
}
.top-bar li {
  float: left;
}
.top-bar a {
  color: white;
  text-decoration: none;
  padding: 10px 15px;
}
.top-bar a:hover {
  background-color: #ddd;
  color: black;
}
</style>
<style>
.container { max-width: 600px; margin: 0 auto; padding: 20px; }
.upload-area { border: 2px dashed #ccc; padding: 20px; text-align: center; cursor: pointer; }
.upload-area:hover { border-color: #999; }
.photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
.photo-item { height: 150px; object-fit: cover; border-radius: 5px; }
</style>
<style>
.gallery-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
  padding: 20px;
}
.gallery-item {
  border-radius: 8px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  transition: transform 0.3s ease;
}
.gallery-item:hover {
  transform: scale(1.05);
}
.gallery-item img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
}
</style>
</head>
<body>
<div class="top-bar">
  <ul>
    <li><a href="#home">Home</a></li>
    <li><a href="#about">About</a></li>
    <li><a href="#services">Services</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
</div>
<div class="container">
  <h1>Owner Photo Gallery</h1>
  
  <!-- Upload Form -->
  <form id="uploadForm" enctype="multipart/form-data">
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      Click to select photo or drag & drop
    </div>
    <input type="file" id="fileInput" name="photo" accept="image/*" style="display:none">
    <button type="submit">Upload</button>
  </form>

  <!-- Photo Gallery -->
  <div id="gallery" class="photo-grid"></div>
</div>

<script>
// Handle drag & drop
document.querySelector('.upload-area').addEventListener('dragover', e => {
  e.preventDefault();
});

document.querySelector('.upload-area').addEventListener('drop', e => {
  e.preventDefault();
  const files = e.dataTransfer.files;
  if (files.length > 0) {
    document.getElementById('fileInput').files = files;
    submitForm();
  }
});

// Submit form with AJAX
document.getElementById('uploadForm').addEventListener('submit', e => {
  e.preventDefault();
  submitForm();
});

function submitForm() {
  const formData = new FormData(document.getElementById('uploadForm'));
  fetch('/upload', {
    method: 'POST',
    body: formData
  })
  .then(response => response.json())
  .then(data => {
    if (data.success) {
      loadGallery(); // Refresh gallery after upload
    }
  });
}

// Load existing photos
function loadGallery() {
  fetch('/photos')
  .then(response => response.json())
  .then(data => {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    data.photos.forEach(photo => {
      const img = document.createElement('img');
      img.src = `/uploads/${photo}`;
      img.className = 'photo-item';
      gallery.appendChild(img);
    });
  });
}

// Initial load
loadGallery();
</script>
<div class="gallery-container" id="gallery"></div>

<script>
const photos = [
  'C:\Users\parvi\dark\image.png',
  'place2.jpg',
  'place3.jpg',
  'place4.jpg'
];

function loadGallery() {
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '';
  
  photos.forEach(photo => {
    const item = document.createElement('div');
    item.className = 'gallery-item';
    
    const img = document.createElement('img');
    img.src = `C:\Users\parvi\dark\image.png`;
    img.alt = `Place photo ${photo}`;
    
    item.appendChild(img);
    gallery.appendChild(item);
  });
}

// Load on page load
window.onload = loadGallery;
</script>
</body>
</html>
